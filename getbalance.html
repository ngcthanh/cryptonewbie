<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Multi-chain Wallet Balance</title>
<style>
body { font-family: Arial; padding: 20px; }
input, button { padding: 10px; margin: 5px; }
.result { margin-top: 20px; }
</style>
</head>

<body>

<h2>💰 Kiểm tra tổng tài sản đa chain</h2>

<input type="text" id="wallet" placeholder="Nhập ví (0x...)" size="50"/>
<button onclick="getBalances()">Kiểm tra</button>

<div class="result" id="result"></div>

<script>
const API_KEY = "uUtZGQUM.lQA9L9p0jBXCfq2SaLUL9kW1JG2Y1upW\";

const chains = [
{ name: "Ethereum", id: 1 },
{ name: "BSC", id: 56 },
{ name: "Polygon", id: 137 },
{ name: "Arbitrum", id: 42161 },
{ name: "Optimism", id: 10 }
];

async function getBalances(){
const wallet = document.getElementById("wallet").value;
let total = 0;
let html = "<h3>Kết quả:</h3>";

for(const chain of chains){

try{
const url = `https://api.covalenthq.com/v1/${chain.id}/address/${wallet}/balances_v2/?key=${API_KEY}`;

const res = await fetch(url);
const data = await res.json();

let chainTotal = 0;

data.data.items.forEach(token=>{
if(token.quote){
chainTotal += token.quote;
}
});

total += chainTotal;

html += `<p>${chain.name}: $${chainTotal.toFixed(2)}</p>`;

}catch(e){
html += `<p>${chain.name}: lỗi</p>`;
}
}

html += `<h2>Tổng tài sản: $${total.toFixed(2)}</h2>`;

document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
